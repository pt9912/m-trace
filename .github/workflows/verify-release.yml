name: Verify Release

# Reusable Pre-Publish-Gate: wird von publish-images.yml und
# publish-packages.yml als vorgeschalteter `needs: verify`-Job
# aufgerufen. Faellt die Verifikation, laeuft der Publish-Job NICHT
# (harte Blockade gegen das Veroeffentlichen eines roten oder
# verwundbaren Stands). Spiegelt die beiden build.yml-Jobs (CI-Gates +
# Security-Gates inkl. Trivy-image-scan) gegen den exakt zu
# publizierenden Commit (`ref`), nicht gegen main.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to verify (the commit being published)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  gates:
    name: CI gates
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: make gates

      - name: Build
        run: make build

      - name: CLI smoke
        run: make smoke-cli

  security:
    name: Security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: govulncheck (apps/api)
        run: make vuln-check

      - name: pnpm audit (TS workspace, --audit-level high)
        run: make audit-ts

      - name: Trivy image scan (api + dashboard + analyzer-service)
        run: make image-scan

      - name: Upload Trivy cache (artefact)
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-cache-verify
          path: .security/.trivy-cache
          retention-days: 7
          if-no-files-found: ignore
