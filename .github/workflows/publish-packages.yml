name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, usually a release tag such as v0.20.0"
        required: true
        default: "main"
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: true
        type: boolean
        default: true
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish npm packages to GitHub Packages
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      PUBLISH_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Set up Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@pt9912"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry-run publish
        if: env.DRY_RUN == 'true'
        run: make package-publish-dry-run

      - name: Publish
        if: env.DRY_RUN != 'true'
        run: MTRACE_PACKAGE_PUBLISH_APPROVED=1 make package-publish
