name: Benchmark regression (nightly)

#  (extra-gates.md) —
# Statistisch belastbare Trend-Erkennung mit Baseline-Vergleich.
# **Nicht im PR-Pfad**; Nightly + Release-blockierend.
#
# Mechanik:
#   1. Cron 01:27 Europe/Berlin (gestaffelt mit den anderen Nightlies
#      innerhalb der 01:xx-Stunde).
#   2. Bench-Lauf mit `-count=10 -benchtime=2s` für statistische
#      Signifikanz; Output nach `.tmp/bench/current.txt`.
#   3. Baseline aus orphan-Branch `benchmark-baseline` als File
#      `benchmarks/api-bench.txt` ziehen. Falls Branch oder File
#      fehlt: Workflow-Run gilt als initiale Baseline-Etablierung
#      (Operator pusht `current.txt` manuell via workflow_dispatch
#      job `update-baseline`, siehe README-Mechanik unten).
#   4. `benchstat baseline current` produziert Vergleichstabelle.
#   5. `scripts/check-benchstat-regression.mjs` parst die Tabelle
#      und failed bei +15% Regression auf statistisch signifikantem
#      Ergebnis (p<0.05; Schwelle in
#      `docs/perf/budgets.md` §3 Wartung dokumentiert).
#   6. Alle Outputs landen als Artefakt mit 30 Tagen Retention.
#
# Baseline-Pflege:
#   - Initiale Etablierung: Operator pusht den aktuellen Bench-
#     Output in den orphan-Branch `benchmark-baseline` als File
#     `benchmarks/api-bench.txt`. Erst danach laufen Folge-Nightlies
#     mit echtem Vergleich.
#   - Drift-Akzeptanz: nach einem absichtlichen Performance-Tradeoff
#     pusht der Operator den neuen Bench-Output erneut nach
#     `benchmark-baseline`.

on:
  schedule:
    - cron: '27 1 * * *'
      timezone: "Europe/Berlin"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  benchmark-regression:
    name: Benchmark regression scan
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'
          check-latest: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 11.13.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Print runner info
        run: bash scripts/print-bench-runner-info.sh

      - name: Check bench quarantines (max 30 Tage)
        run: |
          mkdir -p .tmp/bench
          node scripts/check-bench-quarantines.mjs \
            --output .tmp/bench/quarantine.json \
            apps/api packages/stream-analyzer

      - name: Run Go benchmarks (current HEAD, count=10)
        working-directory: apps/api
        run: |
          # `..` von apps/api ist apps/, NICHT das Repo-Root. Damit
          # `current.txt` neben `quarantine.json` im Artefakt landet
          # und der spaetere `benchstat .tmp/bench/...`-Vergleich
          # die Datei findet, muss der Pfad auf `../../.tmp/bench`.
          mkdir -p ../../.tmp/bench
          # `tee` statt `>` haelt den Bench-Output im Workflow-Log
          # sichtbar — Test-Failures (`b.Fatalf`, `--- FAIL`) landen
          # ueber STDOUT und waren bisher unsichtbar im File. `set -o
          # pipefail` ist Pflicht, sonst maskiert `tee` den
          # `go test`-Exit-Code.
          set -o pipefail
          go test -bench=. -benchmem -count=10 -benchtime=2s \
            ./hexagon/... ./adapters/... \
            2>&1 | tee ../../.tmp/bench/current.txt
          echo "[benchmark] head bench written to .tmp/bench/current.txt"

      - name: Fetch baseline from orphan branch
        id: baseline
        run: |
          if git fetch --depth=1 origin benchmark-baseline 2>/dev/null; then
            if git show origin/benchmark-baseline:benchmarks/api-bench.txt > .tmp/bench/baseline.txt 2>/dev/null; then
              echo "found=1" >> "$GITHUB_OUTPUT"
              echo "[benchmark] baseline pulled from orphan branch benchmark-baseline"
            else
              echo "found=0" >> "$GITHUB_OUTPUT"
              echo "[benchmark] orphan branch exists but benchmarks/api-bench.txt is missing"
            fi
          else
            echo "found=0" >> "$GITHUB_OUTPUT"
            echo "[benchmark] orphan branch benchmark-baseline does not yet exist"
          fi

      - name: Compare with benchstat
        if: steps.baseline.outputs.found == '1'
        id: compare
        continue-on-error: true
        run: |
          benchstat .tmp/bench/baseline.txt .tmp/bench/current.txt \
            > .tmp/bench/comparison.txt
          cat .tmp/bench/comparison.txt
          node scripts/check-benchstat-regression.mjs --threshold-percent 15 \
            .tmp/bench/comparison.txt

      - name: Skip note (no baseline)
        if: steps.baseline.outputs.found == '0'
        run: |
          echo "::notice title=Bench baseline missing::orphan-Branch benchmark-baseline existiert noch nicht oder enthaelt kein benchmarks/api-bench.txt. Initial-Etablierung: aktuellen Bench-Output manuell in den orphan-Branch pushen. Ohne Baseline ist kein Vergleich moeglich; dieser Run gilt als observation-only."

      - name: Open regression issue (on bench compare failure)
        if: steps.compare.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/open-bench-regression-issue.sh

      - name: Upload bench artifact
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bench-regression-${{ github.run_id }}
          path: .tmp/bench/
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail on regression
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error title=Benchmark regression::Significant regression detected; see comparison artifact and auto-issue."
          exit 1
