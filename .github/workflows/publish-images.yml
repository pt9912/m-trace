name: Publish Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, usually a release tag such as v0.21.0"
        required: true
        default: "main"
      image_tag:
        description: "OCI image tag; defaults to ref without leading v"
        required: false
        default: ""
      dry_run:
        description: "Build and inspect images without pushing"
        required: true
        type: boolean
        default: true
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  verify:
    # Pre-Publish-Gate: nur echte Veroeffentlichungen gaten (release-Event
    # oder dispatch mit dry_run=false). Ein Dry-Run-Dispatch soll den
    # Publish-Mechanismus auch auf rotem/WIP-Stand testen koennen, daher
    # wird verify dann uebersprungen.
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
    uses: ./.github/workflows/verify-release.yml
    with:
      ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

  publish:
    name: Publish runtime images to GHCR
    needs: verify
    # verify ist nur fuer echte Publishes scharf; bei uebersprungenem
    # verify (Dry-Run) muss 'skipped' den Job durchlassen, 'failure'
    # blockiert ihn hart.
    if: ${{ always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      PUBLISH_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
      REQUESTED_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Resolve image tag
        id: image-tag
        shell: bash
        run: |
          tag="${REQUESTED_IMAGE_TAG}"
          if [ -z "$tag" ]; then
            tag="${PUBLISH_REF#v}"
          fi
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "A release-like image tag is required" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: env.DRY_RUN != 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run publish
        if: env.DRY_RUN == 'true'
        run: make image-publish-dry-run VER="${{ steps.image-tag.outputs.tag }}"

      - name: Publish
        if: env.DRY_RUN != 'true'
        run: MTRACE_IMAGE_PUBLISH_APPROVED=1 make image-publish VER="${{ steps.image-tag.outputs.tag }}"
