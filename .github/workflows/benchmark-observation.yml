name: Benchmark observation

# plan-0.9.5 §2 Tranche 1 (DoD-Item §2-6) — Beobachtungs-Workflow
# für die Bench-Suite. Initial **nicht-blockierend** (`continue-on-
# error: true`), bis N=3-5 grüne CI-Läufe vorliegen; danach wird
# `make benchmark-smoke` per Folge-Commit in `make gates` aufgenommen
# und PR-blockierend.
#
# Trigger:
#   - schedule: nightlich um 02:30 UTC (entspannte Stunde, kein
#     Konflikt mit dem WebRTC-Drift-Workflow um 03:30 UTC).
#   - workflow_dispatch: manueller Trigger für ad-hoc-Beobachtung
#     (z. B. nach Performance-relevanten Changes).
#
# Output:
#   - .tmp/bench/api-bench.txt + .tmp/bench/analyzer-bench.txt
#     werden als Workflow-Artefakt mit 14 Tagen Retention hochgeladen,
#     damit die Beobachtungs-Reihe historisierbar bleibt (Vorbereitung
#     für Tranche 2, Nightly-`benchstat`-Regressionen).

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-smoke:
    name: Benchmark smoke (observation)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    # Beobachtungsphase: Failures sollen nicht den Workflow rot
    # markieren. Sobald die Beobachtungsphase abgeschlossen ist,
    # entfernt der Tranche-1-Closeout-Commit `continue-on-error`
    # und das Job-Result wird PR-blockierend.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stream-analyzer benchmark smoke
        id: ts-bench
        continue-on-error: true
        run: make analyzer-benchmark-smoke

      - name: API benchmark smoke
        id: api-bench
        continue-on-error: true
        run: make api-benchmark-smoke

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-observation-${{ github.run_id }}
          path: .tmp/bench/
          retention-days: 14
          if-no-files-found: ignore

      - name: Beobachtungs-Status
        if: always()
        run: |
          echo "[observation] ts-bench: ${{ steps.ts-bench.outcome }}"
          echo "[observation] api-bench: ${{ steps.api-bench.outcome }}"
          echo "[observation] Diese Stage ist Beobachtungsphase (continue-on-error: true)."
          echo "[observation] Nach N=3-5 grünen Läufen entfernt der Tranche-1-Closeout-Commit"
          echo "[observation] continue-on-error und der Smoke landet PR-blockierend in make gates."
