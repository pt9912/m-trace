name: Benchmark smoke

# plan-0.9.5 §2 Tranche 1 (DoD-Item §2-6) plus plan-0.22.0:
# Benchmark-Smoke für die Bench-Suite. Nach fünf grünen
# Beobachtungsläufen (2026-05-09..2026-05-13) ist `make
# benchmark-smoke` PR-blockierend über `make gates`; dieser Nightly
# läuft zusätzlich hart und liefert Artefakte.
#
# Trigger:
#   - schedule: nightlich um 01:07 Europe/Berlin (gestaffelt mit den
#     anderen Nightlies innerhalb der 01:xx-Stunde).
#   - workflow_dispatch: manueller Trigger für ad-hoc-Beobachtung
#     (z. B. nach Performance-relevanten Changes).
#
# Output:
#   - .tmp/bench/api-bench.txt + .tmp/bench/analyzer-bench.txt
#     werden als Workflow-Artefakt mit 14 Tagen Retention hochgeladen.

on:
  schedule:
    - cron: '7 1 * * *'
      timezone: "Europe/Berlin"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stream-analyzer benchmark smoke
        id: ts-bench
        run: make analyzer-benchmark-smoke

      - name: API benchmark smoke
        id: api-bench
        run: make api-benchmark-smoke

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-observation-${{ github.run_id }}
          path: .tmp/bench/
          retention-days: 14
          if-no-files-found: ignore

      - name: Benchmark status
        if: always()
        run: |
          echo "[benchmark-smoke] ts-bench: ${{ steps.ts-bench.outcome }}"
          echo "[benchmark-smoke] api-bench: ${{ steps.api-bench.outcome }}"
          echo "[benchmark-smoke] PR-blocking path: make gates -> benchmark-smoke."
