name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: CI gates
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace build
        run: make workspace-build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Coverage gate
        run: make coverage-gate

      - name: Architecture check
        run: make arch-check

      - name: Build
        run: make build

      - name: Player-SDK performance smoke
        run: make sdk-performance-smoke

      - name: CLI smoke
        run: make smoke-cli
