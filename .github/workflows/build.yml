name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: CI gates
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: make gates

      - name: Build
        run: make build

      - name: CLI smoke
        run: make smoke-cli

  security:
    # plan-0.8.5 Tranche 1 — Quality-Gates Wave 1.
    # Parallel zum `build`-Job, damit Vulnerability-DB-Download und
    # Trivy-Image-Pull den schnellen Inner-Loop nicht serialisieren.
    name: Security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: govulncheck (apps/api)
        run: make vuln-check

      - name: pnpm audit (TS workspace, --audit-level high)
        run: make audit-ts

      - name: Trivy image scan (api + dashboard + analyzer-service)
        run: make image-scan

      - name: Upload Trivy cache (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-cache
          path: .security/.trivy-cache
          retention-days: 7
          if-no-files-found: ignore
