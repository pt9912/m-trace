name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Coverage gate
        run: make coverage-gate

      - name: Architecture check
        run: make arch-check

      - name: Build runtime image
        run: make build
