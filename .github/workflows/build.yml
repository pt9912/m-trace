name: Build

on:
  pull_request:
  push:
    branches:
      - main
    # Tag-Pushes verifizieren den getaggten Commit mit denselben CI- +
    # Security-Gates (inkl. Trivy-image-scan) — sichtbarer roter/gruener
    # Lauf auf dem Release-Tag. Kein harter Block (das leisten
    # `make release-gate` lokal bzw. die publish-Workflows); macht aber
    # ein Tag auf rotem Stand sofort sichtbar.
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: CI gates
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: make gates

      - name: Build
        run: make build

      - name: CLI smoke
        run: make smoke-cli

  security:
    #  — Quality-Gates Wave 1.
    # Parallel zum `build`-Job, damit Vulnerability-DB-Download und
    # Trivy-Image-Pull den schnellen Inner-Loop nicht serialisieren.
    name: Security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: govulncheck (apps/api)
        run: make vuln-check

      - name: pnpm audit (TS workspace, --audit-level high)
        run: make audit-ts

      - name: Trivy image scan (api + dashboard + analyzer-service)
        run: make image-scan

      - name: Upload Trivy cache (artefact)
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-cache
          path: .security/.trivy-cache
          retention-days: 7
          if-no-files-found: ignore

  postgres:
    # ADR-0006: die Persistenz-Adapter gegen einen echten Postgres
    # verifizieren. Die pglab-Tests sind über MTRACE_PG_LAB_DSN gated und
    # laufen NICHT im `build`-Job (make gates skippt sie ohne DSN) — dieser
    # Job schließt die zweite Hälfte der Persistenz-Matrix (SQLite via
    # make gates, Postgres hier). Parallel zu build/security.
    # scripts/smoke-pg-lab.sh ist self-contained (startet eigene
    # Postgres-Container inkl. track_commit_timestamp=on via Docker).
    name: Postgres persistence
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Postgres pglab smoke (Contract-Suite + 6 Ports + R-27/R-28 + boot-guard)
        run: make smoke-pg-lab
