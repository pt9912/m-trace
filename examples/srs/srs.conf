# SRS-Konfiguration für das `mtrace-srs`-Lab — plan-0.9.0 §3 Tranche 2.
#
# Minimale Konfiguration: RTMP-Ingest auf 1935, HTTP-API auf 1985 für
# Operator-Inspektion und Smoke-Probe, HTTP-FLV-Read auf 8088 für
# Operator-Verifikation. Kein HLS-Output (das ist der Pfad anderer
# Beispiele), kein WebRTC-Pfad (das ist `mtrace-webrtc`), kein DASH-
# Pfad (das ist `mtrace-dash`).
#
# Reload-Konvention: SRS lädt `srs.conf` beim Container-Start; in einem
# Lab-Setup gibt es keinen Hot-Reload-Pfad — Operator startet das
# Compose-Project neu (`docker compose -p mtrace-srs restart srs`).

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8088;
}

vhost __defaultVhost__ {
    # HTTP-FLV-Remux veröffentlicht jeden RTMP-Stream als FLV unter
    # `http://localhost:8088/<app>/<stream>.flv` — Operator-sichtbarer
    # Read-Pfad für die manuelle Verifikation.
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
