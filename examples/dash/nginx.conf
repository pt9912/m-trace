# plan-0.5.0 §5 Tranche 4 — nginx-Server für das DASH-Beispiel.
#
# Servisiert das shared Volume `/usr/share/nginx/html/dash/` (Mount-
# Ziel des `dash-output`-Volumes aus compose.yaml). MPD und Segmente
# liegen direkt im Root des Mount-Pfads — keine Sub-Verzeichnisse.

server {
    listen 80;
    server_name localhost;

    # CORS für lokale DASH-Player (dash.js, Shaka, native DASH-fähige
    # Browser-Test-Seiten). Lab-Setup; produktiv würde hier eine
    # restriktivere Allow-Liste stehen.
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Headers "Range";
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range";

    # DASH-Live: Manifest und Segmente sollen nicht gecached werden,
    # damit Operator/Smoke immer den aktuellen Window-Stand sehen.
    add_header Cache-Control "no-store";

    # MIME-Types: nginx default kennt application/dash+xml für .mpd
    # nicht. Wir setzen das explizit.
    types {
        application/dash+xml mpd;
        video/iso.segment    m4s;
        video/mp4            mp4;
    }
    default_type application/octet-stream;

    location / {
        root /usr/share/nginx/html/dash;
        autoindex off;
    }
}
