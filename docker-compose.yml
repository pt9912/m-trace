services:
  api:
    build:
      context: ./apps/api
      target: runtime
    image: m-trace-api:0.1.2
    depends_on:
      - analyzer-service
    environment:
      MTRACE_API_LISTEN_ADDR: ":8080"
      # Persistenz-Modus: SQLite per Default ab 0.4.0 (ADR-0002 §8.1).
      # Override mit `MTRACE_PERSISTENCE=inmemory` für Sessions, die
      # bewusst Restart-flüchtig sein sollen.
      MTRACE_PERSISTENCE: "sqlite"
      MTRACE_SQLITE_PATH: "/var/lib/mtrace/m-trace.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-}"
      ANALYZER_BASE_URL: "http://analyzer-service:7000"
    volumes:
      # SQLite-Volume überlebt `make stop`/`docker compose down` ohne
      # `--volumes`. Reset ausschließlich über `make wipe` (siehe
      # ADR-0002 §8.4 und API-Kontrakt §10.1).
      - mtrace-data:/var/lib/mtrace
    ports:
      - "8080:8080"

  analyzer-service:
    build:
      context: .
      dockerfile: ./apps/analyzer-service/Dockerfile
    image: m-trace-analyzer:0.3.0
    environment:
      ANALYZER_LISTEN_HOST: "0.0.0.0"
      ANALYZER_LISTEN_PORT: "7000"
      # Lab-Default: erlaubt das Analysieren intern erreichbarer
      # MediaMTX-Streams (`http://mediamtx:8888/...`) — der Compose-
      # Bridge gibt RFC1918-IPs aus, die der SSRF-Schutz sonst
      # blockt. Produktions-Deployments setzen das Flag nicht
      # (siehe docs/user/stream-analyzer.md §6).
      ANALYZER_ALLOW_PRIVATE_NETWORKS: "true"
    ports:
      - "7000:7000"

  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    image: m-trace-dashboard:0.1.2
    depends_on:
      - api
      - mediamtx
    environment:
      PUBLIC_API_BASE_URL: "http://localhost:8080"
      PUBLIC_API_TOKEN: "demo-token"
      PUBLIC_HLS_URL: "http://localhost:8888/teststream/index.m3u8"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://localhost:8080/api/playback-events"
    ports:
      - "5173:5173"

  dashboard-e2e:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    image: m-trace-dashboard:0.1.2-e2e
    profiles:
      - test
    depends_on:
      - api
      - mediamtx
    environment:
      PUBLIC_API_BASE_URL: "http://api:8080"
      PUBLIC_API_TOKEN: "demo-token"
      PUBLIC_HLS_URL: "http://mediamtx:8888/teststream/index.m3u8"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://api:8080/api/playback-events"

  mediamtx:
    image: bluenviron/mediamtx:1
    volumes:
      - ./services/media-server/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8888:8888"
      - "9997:9997"

  stream-generator:
    image: jrottenberg/ffmpeg:8.1-ubuntu2404
    depends_on:
      - mediamtx
    volumes:
      - ./services/stream-generator/ffmpeg-loop.sh:/stream-generator/ffmpeg-loop.sh:ro
    entrypoint: ["/bin/sh"]
    command: ["/stream-generator/ffmpeg-loop.sh"]

  browser-e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles:
      - test
    depends_on:
      - api
      - dashboard-e2e
      - mediamtx
      - stream-generator
    working_dir: /work
    environment:
      API_URL: "http://api:8080"
      DASHBOARD_URL: "http://dashboard-e2e:5173"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://api:8080/api/playback-events"
    volumes:
      - .:/work
      - /work/node_modules
      - /work/apps/dashboard/node_modules
      - /work/packages/player-sdk/node_modules
    entrypoint: ["/bin/bash", "/work/scripts/run-playwright-container.sh"]

  prometheus:
    image: prom/prometheus:v3.11.2
    profiles:
      - observability
    depends_on:
      - api
      - otel-collector
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:13.0.1
    profiles:
      - observability
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    profiles:
      - observability
    depends_on:
      tempo:
        condition: service_started
        required: false
    # Config-Pfad ist env-gesteuert (plan-0.4.0 §6.3). Default
    # `config.yaml` exportiert Traces ausschließlich an den
    # Debug-Exporter — kein Tempo-Verbindungsversuch ohne
    # explizites `make dev-tempo` (Pflicht aus §6 DoD: "make
    # dev-observability darf keinen Tempo-Exporter konfigurieren").
    # Beide Config-Files werden bind-gemountet, damit kein zweiter
    # Service-Eintrag nötig ist.
    command: ["--config=/etc/otelcol-contrib/${COLLECTOR_CONFIG:-config.yaml}"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./observability/otel-collector/config-tempo.yaml:/etc/otelcol-contrib/config-tempo.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"

  # Tempo läuft nur, wenn das `tempo`-Profil aktiv ist (plan-0.4.0
  # §6). RAK-31 ist Kann-Scope; ohne Profil bleibt RAK-29/RAK-32
  # vollständig funktional ohne Tempo-Verbindungsversuch.
  tempo:
    image: grafana/tempo:2.6.1
    profiles:
      - tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - mtrace-tempo-data:/var/tempo
    ports:
      - "3200:3200"

volumes:
  # Benanntes Volume für die SQLite-Datei des api-Services (ADR-0002
  # §8.1). Bleibt bei `make stop` und `docker compose down` (ohne
  # `--volumes`) erhalten; nur `make wipe` löscht es.
  mtrace-data: {}
  # Tempo-Trace-Storage (WAL + Blocks). Bleibt analog mtrace-data
  # über `make stop` erhalten, wird über `make wipe` mit-aufgeräumt
  # (siehe Makefile WIPE_VOLUMES).
  mtrace-tempo-data: {}
