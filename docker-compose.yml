services:
  api:
    build:
      context: ./apps/api
      target: runtime
    image: m-trace-api:0.1.0
    environment:
      MTRACE_API_LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"

  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    image: m-trace-dashboard:0.1.1
    depends_on:
      - api
      - mediamtx
    environment:
      PUBLIC_API_BASE_URL: "http://localhost:8080"
      PUBLIC_HLS_URL: "http://localhost:8888/teststream/index.m3u8"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://localhost:8080/api/playback-events"
    ports:
      - "5173:5173"

  mediamtx:
    image: bluenviron/mediamtx:1
    volumes:
      - ./services/media-server/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8888:8888"
      - "9997:9997"

  stream-generator:
    image: jrottenberg/ffmpeg:8.1-ubuntu2404
    depends_on:
      - mediamtx
    volumes:
      - ./services/stream-generator/ffmpeg-loop.sh:/stream-generator/ffmpeg-loop.sh:ro
    entrypoint: ["/bin/sh"]
    command: ["/stream-generator/ffmpeg-loop.sh"]
