services:
  api:
    build:
      context: ./apps/api
      target: runtime
    image: m-trace-api:0.1.2
    environment:
      MTRACE_API_LISTEN_ADDR: ":8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-}"
    ports:
      - "8080:8080"

  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    image: m-trace-dashboard:0.1.2
    depends_on:
      - api
      - mediamtx
    environment:
      PUBLIC_API_BASE_URL: "http://localhost:8080"
      PUBLIC_HLS_URL: "http://localhost:8888/teststream/index.m3u8"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://localhost:8080/api/playback-events"
    ports:
      - "5173:5173"

  dashboard-e2e:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    image: m-trace-dashboard:0.1.2-e2e
    profiles:
      - test
    depends_on:
      - api
      - mediamtx
    environment:
      PUBLIC_API_BASE_URL: "http://api:8080"
      PUBLIC_HLS_URL: "http://mediamtx:8888/teststream/index.m3u8"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://api:8080/api/playback-events"

  mediamtx:
    image: bluenviron/mediamtx:1
    volumes:
      - ./services/media-server/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8888:8888"
      - "9997:9997"

  stream-generator:
    image: jrottenberg/ffmpeg:8.1-ubuntu2404
    depends_on:
      - mediamtx
    volumes:
      - ./services/stream-generator/ffmpeg-loop.sh:/stream-generator/ffmpeg-loop.sh:ro
    entrypoint: ["/bin/sh"]
    command: ["/stream-generator/ffmpeg-loop.sh"]

  browser-e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles:
      - test
    depends_on:
      - api
      - dashboard-e2e
      - mediamtx
      - stream-generator
    working_dir: /work
    environment:
      API_URL: "http://api:8080"
      DASHBOARD_URL: "http://dashboard-e2e:5173"
      PUBLIC_PLAYER_COLLECTOR_ENDPOINT: "http://api:8080/api/playback-events"
    volumes:
      - .:/work
      - /work/node_modules
      - /work/apps/dashboard/node_modules
      - /work/packages/player-sdk/node_modules
    entrypoint: ["/bin/bash", "/work/scripts/run-playwright-container.sh"]

  prometheus:
    image: prom/prometheus:v3.11.2
    profiles:
      - observability
    depends_on:
      - api
      - otel-collector
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:13.0.1
    profiles:
      - observability
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    profiles:
      - observability
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
