apiVersion: apps/v1
kind: Deployment
metadata:
  name: m-trace-analyzer
  namespace: m-trace-example
  labels:
    app.kubernetes.io/name: m-trace-analyzer
    app.kubernetes.io/part-of: m-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: m-trace-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m-trace-analyzer
        app.kubernetes.io/part-of: m-trace
    spec:
      containers:
        - name: analyzer
          image: m-trace-analyzer:0.17.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7000
          env:
            - name: ANALYZER_LISTEN_HOST
              value: "0.0.0.0"
            - name: ANALYZER_LISTEN_PORT
              value: "7000"
---
apiVersion: v1
kind: Service
metadata:
  name: m-trace-analyzer
  namespace: m-trace-example
  labels:
    app.kubernetes.io/name: m-trace-analyzer
    app.kubernetes.io/part-of: m-trace
spec:
  selector:
    app.kubernetes.io/name: m-trace-analyzer
  ports:
    - name: http
      port: 7000
      targetPort: http
