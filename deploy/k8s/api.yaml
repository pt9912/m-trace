apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: m-trace-api-data
  namespace: m-trace-example
  labels:
    app.kubernetes.io/name: m-trace-api
    app.kubernetes.io/part-of: m-trace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m-trace-api
  namespace: m-trace-example
  labels:
    app.kubernetes.io/name: m-trace-api
    app.kubernetes.io/part-of: m-trace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: m-trace-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m-trace-api
        app.kubernetes.io/part-of: m-trace
    spec:
      containers:
        - name: api
          image: m-trace-api:0.14.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MTRACE_API_LISTEN_ADDR
              value: ":8080"
            - name: MTRACE_PERSISTENCE
              value: sqlite
            - name: MTRACE_SQLITE_PATH
              value: /var/lib/mtrace/m-trace.db
            - name: ANALYZER_BASE_URL
              value: http://m-trace-analyzer:7000
            - name: MTRACE_AUTH_LAB_DEFAULT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mtrace
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: m-trace-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: m-trace-api
  namespace: m-trace-example
  labels:
    app.kubernetes.io/name: m-trace-api
    app.kubernetes.io/part-of: m-trace
spec:
  selector:
    app.kubernetes.io/name: m-trace-api
  ports:
    - name: http
      port: 8080
      targetPort: http
