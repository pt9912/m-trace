schema_format: "1.0"
name: "m-trace"
version: "1.0.0"

# Quelle: docs/adr/0002-persistence-store.md §8.1.
# Apply-Runner verwaltet die schema_migrations-Tabelle selbst und
# erscheint daher nicht in dieser YAML.
#
# Generiert das Initial-DDL via:
#   make schema-generate
# Validiert die YAML via:
#   make schema-validate

tables:
  projects:
    columns:
      project_id:
        type: text
        required: true
    primary_key: [project_id]

  stream_sessions:
    columns:
      session_id:
        type: text
        required: true
      project_id:
        type: text
        required: true
        references:
          table: projects
          column: project_id
          on_delete: restrict
      state:
        type: text
        required: true
        default: "active"
      started_at:
        type: datetime
        required: true
      last_seen_at:
        type: datetime
        required: true
      ended_at:
        type: datetime
      event_count:
        type: biginteger
        required: true
        default: 0
      correlation_id:
        type: text
      end_source:
        type: text
    primary_key: [project_id, session_id]
    indices:
      - name: idx_stream_sessions_project_started
        columns: [project_id, started_at, session_id]
        type: btree
      # Sweep (`UPDATE … WHERE state = 'active'`) und der active-
      # sessions-Gauge (`SELECT COUNT(*) WHERE state = ?`) scant sonst
      # die ganze Tabelle; dieser Index hält beide Pfade konstant in
      # der Größenordnung des Result-Sets.
      - name: idx_stream_sessions_state
        columns: [state]
        type: btree
    constraints:
      - name: chk_stream_sessions_state
        type: check
        expression: "state IN ('active', 'stalled', 'ended')"
      - name: chk_stream_sessions_end_source
        type: check
        expression: "end_source IS NULL OR end_source IN ('client', 'sweeper')"

  stream_session_boundaries:
    columns:
      project_id:
        type: text
        required: true
      session_id:
        type: text
        required: true
      kind:
        type: text
        required: true
      network_kind:
        type: text
        required: true
      adapter:
        type: text
        required: true
      reason:
        type: text
        required: true
      client_timestamp:
        type: datetime
        required: true
      server_received_at:
        type: datetime
        required: true
    primary_key: [project_id, session_id, kind, network_kind, adapter, reason]
    indices:
      - name: idx_stream_session_boundaries_session
        columns: [project_id, session_id]
        type: btree
    constraints:
      - name: chk_stream_session_boundaries_kind
        type: check
        expression: "kind IN ('network_signal_absent')"
      - name: chk_stream_session_boundaries_network_kind
        type: check
        expression: "network_kind IN ('manifest', 'segment')"
      - name: chk_stream_session_boundaries_adapter
        type: check
        expression: "adapter IN ('hls.js', 'native_hls', 'unknown')"

  playback_events:
    columns:
      ingest_sequence:
        type: identifier
        auto_increment: true
      project_id:
        type: text
        required: true
      session_id:
        type: text
        required: true
      event_name:
        type: text
        required: true
      client_timestamp:
        type: datetime
        required: true
      server_received_at:
        type: datetime
        required: true
      sequence_number:
        type: biginteger
      sdk_name:
        type: text
        required: true
      sdk_version:
        type: text
        required: true
      schema_version:
        type: text
        required: true
      meta:
        type: json
      delivery_status:
        type: text
        required: true
        default: "accepted"
      trace_id:
        type: text
      span_id:
        type: text
      correlation_id:
        type: text
    primary_key: [ingest_sequence]
    indices:
      - name: idx_playback_events_session_canonical
        columns:
          [project_id, session_id, server_received_at, sequence_number, ingest_sequence]
        type: btree
      - name: idx_playback_events_dedup
        columns: [project_id, session_id, sequence_number]
        type: btree
    constraints:
      - name: chk_playback_events_delivery_status
        type: check
        expression: "delivery_status IN ('accepted', 'duplicate_suspected', 'replayed')"
      # JSON-Validierung von `meta` erfolgt im Adapter (encoding/json),
      # nicht via DB-CHECK — `json_valid()` ist nicht portabel
      # (SQLite/MySQL builtin, PostgreSQL hat kein direktes Pendant).
      # Siehe ADR-0002 §8.1.

  # SRT-Health-Samples (plan-0.6.0 §4 Sub-3.3, RAK-42/RAK-46).
  # Spec: spec/backend-api-contract.md §10.6, spec/telemetry-model.md §7.
  # Dedupe-Regel: Eindeutigkeit über
  #   (project_id, stream_id, connection_id,
  #    COALESCE(source_observed_at, source_sequence)).
  # Adapter setzt das mit ON CONFLICT DO NOTHING um — collected_at
  # allein ist kein stabiler Schlüssel.
  srt_health_samples:
    columns:
      id:
        type: identifier
        auto_increment: true
      project_id:
        type: text
        required: true
        references:
          table: projects
          column: project_id
          on_delete: restrict
      stream_id:
        type: text
        required: true
      connection_id:
        type: text
        required: true
      source_observed_at:
        type: datetime
      source_sequence:
        type: text
      collected_at:
        type: datetime
        required: true
      ingested_at:
        type: datetime
        required: true
      rtt_ms:
        type: float
        required: true
      packet_loss_total:
        type: biginteger
        required: true
      packet_loss_rate:
        type: float
      retransmissions_total:
        type: biginteger
        required: true
      available_bandwidth_bps:
        type: biginteger
        required: true
      throughput_bps:
        type: biginteger
      required_bandwidth_bps:
        type: biginteger
      sample_window_ms:
        type: biginteger
      source_status:
        type: text
        required: true
      source_error_code:
        type: text
        required: true
      connection_state:
        type: text
        required: true
      health_state:
        type: text
        required: true
    primary_key: [id]
    indices:
      # Latest-First-Reads für GET /api/srt/health[/{stream_id}].
      - name: idx_srt_health_samples_stream_ingested
        columns: [project_id, stream_id, ingested_at, id]
        type: btree
      # Dedupe-Lookup vor INSERT (Adapter prüft Vorhandensein).
      - name: idx_srt_health_samples_dedupe
        columns: [project_id, stream_id, connection_id, source_observed_at, source_sequence]
        type: btree
    constraints:
      - name: chk_srt_health_samples_source_status
        type: check
        expression: "source_status IN ('ok', 'unavailable', 'partial', 'stale', 'no_active_connection')"
      - name: chk_srt_health_samples_source_error_code
        type: check
        expression: "source_error_code IN ('none', 'source_unavailable', 'no_active_connection', 'partial_sample', 'stale_sample', 'parse_error')"
      - name: chk_srt_health_samples_connection_state
        type: check
        expression: "connection_state IN ('connected', 'no_active_connection', 'unknown')"
      - name: chk_srt_health_samples_health_state
        type: check
        expression: "health_state IN ('healthy', 'degraded', 'critical', 'unknown')"
