# nginx-LB-Variante NUR für den R-26-b-Fairness-Modus des Scale-out-
# Lasttests (FAIRNESS=1 in scripts/smoke-scaleout-load.sh, eingebunden
# über SCALEOUT_NGINX_CONF in docker-compose.scaleout.yml).
#
# LAB-ONLY: reicht den client-gelieferten X-Forwarded-For-Header
# UNVERÄNDERT durch — k6 simuliert damit synthetische per-Projekt-
# Client-IPs (10.99.0.<i>); mit dem korrekten strip+append der
# Default-Conf (scaleout-nginx.conf) wäre das letzte Element immer die
# eine k6-Container-IP und alle Projekte teilten hinter dem LB einen
# client_ip-Bucket (die Messung sähe den IP-Bucket statt der
# Per-Projekt-Isolation). Wirkt nur zusammen mit
# MTRACE_TRUST_FORWARDED_FOR=1 in der API.
#
# NIE für Produktion oder andere Tests verwenden: ein Proxy, der
# client-XFF verbatim durchreicht, macht IP-basierte Limits spoofbar.
events {}

http {
    upstream mtrace_api {
        server api-1:8080;
        server api-2:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://mtrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }
    }
}
