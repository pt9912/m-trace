# nginx-Load-Balancer für den Multi-Replica-Scale-out-Harness
# (docker-compose.scaleout.yml). Round-Robin über die zwei API-Replicas;
# der Scale-out-Lasttest (R-26 c) treibt Last gegen diesen LB, sodass die
# Requests auf beide Replicas verteilt gegen den geteilten Postgres-Store
# laufen.
events {}

http {
    upstream mtrace_api {
        server api-1:8080;
        server api-2:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://mtrace_api;
            proxy_set_header Host $host;
            # Korrektes Proxy-Verhalten (strip+append): das letzte
            # XFF-Element ist damit immer die vom LB authentifizierte
            # Hop-IP, nie client-spoofbar. Der R-26-b-Fairness-Modus
            # braucht stattdessen einen XFF-Pass-through und nutzt dafür
            # die SEPARATE Conf scaleout-nginx-fairness.conf (via
            # SCALEOUT_NGINX_CONF) — bewusst nicht diese geteilte Default-
            # Conf, damit kein anderer Scaleout-Konsument den Spoofing-
            # Footgun erbt.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
