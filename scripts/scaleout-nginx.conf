# nginx-Load-Balancer für den Multi-Replica-Scale-out-Harness
# (docker-compose.scaleout.yml). Round-Robin über die zwei API-Replicas;
# der Scale-out-Lasttest (R-26 c) treibt Last gegen diesen LB, sodass die
# Requests auf beide Replicas verteilt gegen den geteilten Postgres-Store
# laufen.
events {}

http {
    upstream mtrace_api {
        server api-1:8080;
        server api-2:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://mtrace_api;
            proxy_set_header Host $host;
            # LAB-ONLY: den client-gelieferten XFF-Header UNVERÄNDERT
            # durchreichen (statt $proxy_add_x_forwarded_for) — der
            # Fairness-Modus (R-26 b) simuliert per synthetischer XFF je
            # Projekt verschiedene Client-IPs; mit Append wäre das letzte
            # Element immer die eine k6-Container-IP und alle Projekte
            # teilten einen client_ip-Bucket. Wirkt nur, wenn die API dem
            # Header traut (MTRACE_TRUST_FORWARDED_FOR=1, sonst ignoriert).
            # Ein Produktions-Proxy MUSS stattdessen strippen+appenden.
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }
    }
}
