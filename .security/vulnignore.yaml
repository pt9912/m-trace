# Vulnerability-Ignore-Liste fuer plan-0.8.5 Quality-Gates Wave 1.
#
# Reservierte Stelle fuer dokumentierte False-Positives oder
# bewusst akzeptierte Findings aus `make vuln-check` (govulncheck)
# und `make image-scan` (Trivy). Jeder Eintrag braucht eine
# Begruendung mit Datum und Trigger fuer das naechste Re-Review.
#
# Schema (Trivy-kompatibel):
#
#   trivy:
#     # CVE-Liste, die Trivy ignorieren soll.
#     ignore:
#       - id: CVE-YYYY-NNNNN
#         reason: "kurze Begruendung"
#         expires: YYYY-MM-DD
#         scope: "image-name oder *"
#
#   govulncheck:
#     # GO-VULN-Liste, die govulncheck als not-affected behandeln soll.
#     # Hinweis: govulncheck unterstuetzt selbst kein Ignore-File. Ein
#     # Treffer hier bedeutet, dass die Build-Pipeline den Befund
#     # bewusst nicht release-blockierend behandelt; die Begruendung
#     # ist Pflicht-Audit-Trail.
#     ignore:
#       - id: GO-YYYY-NNNN
#         reason: "kurze Begruendung"
#         expires: YYYY-MM-DD
#
# Wartungsregel:
#   - `expires` ist Pflicht. Default 90 Tage; danach muss der
#     Eintrag erneuert oder entfernt werden.
#   - Bei `expires`-Ueberschreitung bricht `make security-gates`
#     den Lauf mit Fehlermeldung; das Upgrade- oder Begruendungs-
#     Update gehoert in einen Folge-Commit.
#   - `scripts/render-trivyignore.sh` erzwingt den `expires`-Check
#     und rendert die Trivy-Ignores pro Image-Scope. Automatische
#     Erinnerungen bleiben ein Folge-Item fuer plan-0.9.5.

trivy:
  ignore:
    # CVE-2025-69720 (ncurses): Stack-based Buffer Overflow in
    # analyze_string (progs/infocmp.c) — betrifft das infocmp-CLI-
    # Tool, NICHT die Library selbst. Affected Versions: ncurses
    # bis einschliesslich 6.4 plus 6.5-Pre-Releases bis
    # 6.5-20251212; gefixed in 6.5-20251213+. NVD-Publikation
    # 2026-03-19, NIST HIGH 7.8 / MITRE HIGH 7.3 / CISA-ADP
    # CRITICAL 9.8.
    # Debian-Stand (Security Tracker, Stand 2026-05-11):
    # "vulnerable (no DSA)" fuer bullseye/bookworm/trixie;
    # fixed nur in forky+sid — kein Backport-Plan fuer Trixie.
    # Trifft libtinfo6, ncurses-base und ncurses-bin in der
    # Trixie-Slim-Base 6.5+20250216-2 (Dashboard + Analyzer-
    # Service-Images). Vektor im m-trace-Runtime nicht
    # erreichbar: Container hat kein interaktives Terminal,
    # USER node ruft infocmp niemals auf, kein TTY-Mount, kein
    # CLI-Surface fuer User-Inputs.
    # Re-Review 2026-05-11 (plan-0.12.6 Tranche 1): Trivy-Scan
    # bestaetigt 3 betroffene Packages (libtinfo6, ncurses-base,
    # ncurses-bin); `expires` um 90 Tage auf 2026-11-02
    # verlaengert. Naechster Re-Review-Trigger: forky-Backport-
    # Verfuegbarkeit ODER `expires`-Schwelle.
    - id: CVE-2025-69720
      reason: "ncurses infocmp-CLI Buffer Overflow (analyze_string in progs/infocmp.c); Trixie-Slim-Base ohne Upstream-Fix (no DSA, fix in forky+sid); Container hat keinen TTY-Pfad und ruft infocmp nie auf. NVD-Publikation 2026-03-19."
      expires: 2026-11-02
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-29111 (systemd): Improper Privilege Management in
    # systemd-IPC-API. Unprivileged User schickt malformed Daten
    # an einen IPC-Endpoint und triggert je nach Version
    # unterschiedliche Effekte:
    #   - v249 und aelter: Stack overwriting mit attacker-
    #     controlled content (Pfad zu RCE moeglich).
    #   - v250 und neuer: Assert-Failure → execution freezes (DoS,
    #     keine RCE-Surface).
    # Flaw eingefuehrt in v239. NVD-Publikation 2026-03-23
    # (last-modified 2026-04-15). NVD/CNA-Severity nur MEDIUM 5.5
    # (CVSS 3.1, AV:L/AC:L/PR:L/UI:N/S:U/C:N/I:N/A:H — local,
    # availability-only). Trivy stuft als HIGH ein (Aqua-/
    # Debian-Bewertung), darum bleibt der Eintrag noetig.
    # Debian-Stand (Security Tracker, 2026-05-11): "vulnerable
    # (no DSA)" fuer trixie; fix nur in forky+sid (260.1-1).
    # Trifft libsystemd0 und libudev1 in Trixie-Slim-Base
    # 257.9-1~deb13u1 (also v257.x → neuer Code-Pfad mit
    # Assert-Failure-DoS, kein RCE-Pfad).
    # Vektor im m-trace-Runtime nicht aktivierbar: Container
    # startet als USER node, **kein systemd-PID-1**, keine
    # IPC-Socket-Mounts auf den Host-systemd, keine
    # Privilege-Domain für externen Angreifer im Container.
    # Re-Review 2026-05-11 (plan-0.12.6 Tranche 1): Trivy-Scan
    # bestaetigt 2 betroffene Packages (libsystemd0, libudev1);
    # `expires` um 90 Tage auf 2026-11-02 verlaengert. Naechster
    # Re-Review-Trigger: forky-Backport-Verfuegbarkeit ODER
    # `expires`-Schwelle.
    - id: CVE-2026-29111
      reason: "systemd IPC-API Assert-Failure (Trixie v257.x = post-v250 DoS-Pfad, kein RCE); Trixie ohne Upstream-Fix (no DSA, fix in forky 260.1-1); Container ohne systemd-PID-1 und ohne IPC-Mounts. NVD-Publikation 2026-03-23, NVD MEDIUM 5.5."
      expires: 2026-11-02
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-4878 (libcap): Time-of-check-to-time-of-use
    # (TOCTOU) race condition in cap_set_file(). Ein local
    # unprivileged user mit write-access auf das Parent-Directory
    # eines Capability-getragenen Files kann den setcap-Update-
    # Pfad auf ein attacker-controlled File umleiten — mit
    # potentiellem Privilege-Escalation-Effekt.
    # NVD-Publikation 2026-04-09 (last-modified 2026-05-07).
    # NIST-Severity HIGH 7.0 (CVSS 3.1, AV:L/AC:H/PR:L/UI:N/
    # S:U/C:H/I:H/A:H), Red Hat MEDIUM 6.7 (haben UI:R).
    # Debian-Stand (Security Tracker, 2026-05-11): "vulnerable
    # (no DSA)" fuer trixie; fix nur in forky+sid (1:2.78-1).
    # Trifft libcap2 in Trixie-Slim-Base 1:2.75-10+b8.
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - Container laeuft als unprivileged USER node, **kein**
    #     setcap-Aufruf im Runtime, **keine** Capability-getragenen
    #     Files mit privileged Effekt.
    #   - USER node hat keinen write-access auf
    #     `/etc/sudoers`, `/usr/bin/`-Pfade oder andere
    #     priviligierte Mountpunkte.
    #   - Keine setuid/setcap-Binaries im m-trace-Container-
    #     Layout, die ein Angreifer redirecten koennte.
    # Re-Review 2026-05-11 (plan-0.12.6 Tranche 1): Trivy-Scan
    # bestaetigt 1 betroffenes Package (libcap2); `expires` um
    # 90 Tage auf 2026-11-02 verlaengert. Naechster Re-Review-
    # Trigger: forky-Backport-Verfuegbarkeit (1:2.78-1) ODER
    # `expires`-Schwelle.
    - id: CVE-2026-4878
      reason: "libcap cap_set_file() TOCTOU-Race (Privilege Escalation via parent-dir write-access); Trixie ohne Upstream-Fix (no DSA, fix in forky 1:2.78-1); Container laeuft als unprivileged USER node ohne setcap-Pfad und ohne write-access auf privilegierte Mounts. NVD-Publikation 2026-04-09, NIST HIGH 7.0."
      expires: 2026-11-02
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-42496 / CVE-2026-42497 / CVE-2026-8376 / CVE-2026-9538 /
    # CVE-2026-48962 / CVE-2026-48959 / CVE-2026-13221 /
    # CVE-2026-57432 / CVE-2026-57433 (perl-base):
    # Acht Perl-Vulnerabilities, die mit den Trivy-DB-Updates vom
    # 2026-05-28 (vier davon), 2026-05-31 (CVE-2026-48962),
    # 2026-06-10 (CVE-2026-48959) und 2026-07-15 (CVE-2026-13221,
    # CVE-2026-57432) erstmals im Nightly-Scan auf dem
    # Trixie-Slim-Base 5.40.1-6 (perl-base) angeschlagen sind:
    #   - CVE-2026-42496 (CRITICAL) — Archive::Tar vor 3.08 extrahiert
    #     Symlinks mit attacker-kontrolliertem Ziel; benoetigt einen
    #     Perl-Prozess, der ein praepariertes tar-Archiv auspackt.
    #   - CVE-2026-42497 (HIGH)     — Archive::Tar vor 3.08 extrahiert
    #     Hardlinks mit attacker-kontrolliertem Ziel; selber Vektor
    #     wie 42496, anderer Link-Typ.
    #   - CVE-2026-8376  (CRITICAL) — Perl bis 5.43.10 hat einen
    #     heap buffer overflow beim Kompilieren bestimmter Regex-
    #     Konstrukte; benoetigt einen Perl-Prozess, der attacker-
    #     kontrollierten Regex-Quellcode evaluiert.
    #   - CVE-2026-9538  (HIGH)     — Archive::Tar vor 3.10 erlaubt
    #     Memory-Exhaustion (DoS) ueber praeparierte tar-Files;
    #     selber Vektor wie 42496.
    #   - CVE-2026-48962 (HIGH)     — IO::Compress (in perl-base
    #     enthalten) erlaubt Arbitrary Code Execution ueber ein
    #     attacker-kontrolliertes Output-Glob-Pattern; benoetigt
    #     einen Perl-Prozess, der IO::Compress mit untrusted Glob-
    #     Argumenten aufruft.
    #   - CVE-2026-48959 (HIGH)     — IO::Uncompress::Unzip (in
    #     perl-base enthalten) vor 2.220 hat in fastForward() einen
    #     Per-Byte-Read-Loop (CWE-407): beim Extrahieren benannter
    #     Eintraege aus einem attacker-kontrollierten ZIP wird die
    #     Offset-Ziffernzahl statt des Offsets gegen die Chunk-Groesse
    #     geprueft → CPU-Exhaustion (DoS, availability-only). Benoetigt
    #     einen Perl-Prozess, der ein praepariertes ZIP auspackt.
    #     Fix in IO::Compress 2.220+.
    #   - CVE-2026-13221 (CRITICAL) — Perl bis 5.43.9 erzeugt
    #     unter bestimmten Bedingungen *stillschweigend falsche*
    #     kompilierte regulaere Ausdruecke (silently incorrect
    #     regex compilation); benoetigt einen Perl-Prozess, der
    #     attacker-kontrollierten Regex-Quellcode kompiliert.
    #   - CVE-2026-57432 (HIGH)     — Perl bis 5.43.10 hat einen
    #     Integer Overflow in S_measure_struct → out-of-bounds
    #     Heap-Read bei pack/unpack; benoetigt einen Perl-Prozess,
    #     der pack/unpack ueber attacker-kontrollierte Templates
    #     ausfuehrt.
    # Debian-Stand (Security Tracker, 2026-05-31): "vulnerable
    # (no DSA)" fuer trixie; kein Fixed-Version-Eintrag im Trivy-
    # Report ("Fixed Version" leer) — Upstream-Patch noch nicht
    # in Trixie zurueckportiert.
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - Dashboard- und Analyzer-Service-Images starten als
    #     USER node mit `CMD ["node", "build"]`. Es gibt **keinen**
    #     perl-Aufruf im Runtime-Pfad, keine tar-Extraktion durch
    #     perl, keine Regex-Evaluation in perl. perl-base ist
    #     nur ein transitiver Bestandteil des trixie-slim-Sets
    #     (Maintainer-Scripts, dpkg-Hilfen) und wird nach dem
    #     `docker run` nicht mehr aktiv ausgefuehrt.
    #   - Keine Persistence-Mounts mit User-Inputs, die jemand
    #     in einem perl-Aufruf landen lassen koennte — der
    #     einzige eingehende Pfad ist HTTP/SvelteKit-adapter-node
    #     bzw. der Analyzer-WS, beides node-only.
    # Re-Review 2026-05-28 (Hotfix Nightly-Audit): `expires` 90
    # Tage auf 2026-08-26 gesetzt. Naechster Re-Review-Trigger:
    # Trixie-Backport von Archive::Tar 3.10 + Perl 5.43.11+ ODER
    # `expires`-Schwelle.
    # Nachtrag 2026-06-10 (Hotfix Nightly-Audit): CVE-2026-48959
    # (IO::Uncompress::Unzip, NVD-Publikation 2026-05-27) ist neu
    # angeschlagen; mit demselben `expires` 2026-08-26 in das
    # perl-base-Cohort aufgenommen, damit alle sechs gemeinsam
    # re-reviewt werden. Zusatz-Trigger: IO::Compress 2.220+ in
    # Trixie verfuegbar.
    # Nachtrag 2026-07-15 (Hotfix Nightly-Audit, Issue #14):
    # CVE-2026-13221 (CRITICAL, silently incorrect regex, Perl bis
    # 5.43.9) und CVE-2026-57432 (HIGH, Integer Overflow in
    # S_measure_struct, Perl bis 5.43.10) sind neu angeschlagen.
    # Debian-Tracker-Stand 2026-07-15: trixie fuer BEIDE "vulnerable"
    # ohne Fixed-Version-Eintrag (Trivy-"Fixed Version" leer) —
    # CVE-2026-13221 auch in sid unfixed, CVE-2026-57432 in sid
    # gefixt (perl 5.40.1-8), aber noch nicht nach trixie (5.40.1-6)
    # zurueckportiert. Ein Base-Bump/`apt-get upgrade` macht den
    # Gate also NICHT gruen. Mit demselben `expires` 2026-08-26 in
    # das perl-base-Cohort aufgenommen, damit alle acht gemeinsam
    # re-reviewt werden. Zusatz-Trigger: Trixie-Backport von perl
    # 5.40.1-8 (bzw. Upstream Perl 5.43.10+/5.43.11+).
    # Nachtrag 2026-07-22 (Hotfix Nightly-Audit, Issue #16):
    # CVE-2026-57433 (CRITICAL, Storable <3.41 signed integer
    # overflow) ist neu angeschlagen. Ein crafted SX_HOOK-Record
    # laesst beim thaw()/retrieve() `av_extend` einen negativen
    # Count erhalten → Panic, der die Deserialisierung abbricht
    # (DoS, keine RCE-Surface). Debian-Tracker-Stand 2026-07-22:
    # trixie "vulnerable" bei 5.40.1-6; Fix in forky/sid 5.40.1-8
    # (Upstream Perl 5.43.11), aber NICHT nach trixie zurueckportiert
    # (Trivy-"Fixed Version" leer) — identische Lage zu CVE-2026-57432,
    # ein Base-Bump/`apt-get upgrade` macht den Gate NICHT gruen. Mit
    # demselben `expires` 2026-08-26 in das perl-base-Cohort
    # aufgenommen, damit alle neun gemeinsam re-reviewt werden.
    # Zusatz-Trigger: Trixie-Backport von perl 5.40.1-8.
    - id: CVE-2026-42496
      reason: "perl-base Archive::Tar <3.08 Symlink-Extraction (CRITICAL); Trixie ohne Upstream-Fix; Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine tar-Extraktion durch perl. NVD-Publikation neu im Trivy-DB-Update 2026-05-28."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-42497
      reason: "perl-base Archive::Tar <3.08 Hardlink-Extraction (HIGH); Hardlink-Variante zu CVE-2026-42496, Trixie ohne Upstream-Fix; Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine tar-Extraktion durch perl. NVD-Publikation neu im Trivy-DB-Update 2026-05-28."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-8376
      reason: "perl-base bis 5.43.10 Heap Buffer Overflow beim Regex-Compile (CRITICAL); Trixie ohne Upstream-Fix; Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine attacker-kontrollierte Regex-Evaluation. NVD-Publikation neu im Trivy-DB-Update 2026-05-28."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-9538
      reason: "perl-base Archive::Tar <3.10 Memory-Exhaustion via crafted tar (HIGH); Trixie ohne Upstream-Fix; Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine tar-Extraktion durch perl. NVD-Publikation neu im Trivy-DB-Update 2026-05-28."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-48962
      reason: "perl-base IO::Compress Arbitrary Code Execution via attacker-controlled output glob (HIGH); Trixie ohne Upstream-Fix; Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine IO::Compress-Glob-Evaluation. NVD-Publikation neu im Trivy-DB-Update 2026-05-31."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-48959
      reason: "perl-base IO::Uncompress::Unzip <2.220 fastForward() Per-Byte-Read-Loop (HIGH, CWE-407, CVSS 7.5) → CPU-Exhaustion-DoS via crafted ZIP (availability-only); Trixie ohne Upstream-Fix (Fix in IO::Compress 2.220+); Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine ZIP-Extraktion durch perl. NVD-Publikation 2026-05-27, neu im Nightly-Scan 2026-06-10."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-13221
      reason: "perl-base bis 5.43.9 erzeugt stillschweigend falsche kompilierte Regex (CRITICAL); Trixie ohne Upstream-Fix (auch sid unfixed, Fixed Version leer, Base-Bump hilft nicht); Dashboard/Analyzer-Images rufen perl im Runtime nie auf, keine attacker-kontrollierte Regex-Kompilierung. NVD-Publikation neu im Nightly-Scan 2026-07-15 (Issue #14)."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-57432
      reason: "perl-base bis 5.43.10 Integer Overflow in S_measure_struct → out-of-bounds Heap-Read bei pack/unpack (HIGH); Trixie ohne Upstream-Fix (in sid gefixt in 5.40.1-8, aber nicht nach trixie 5.40.1-6 zurueckportiert, Trivy-Fixed-Version leer, Base-Bump hilft nicht); Dashboard/Analyzer-Images rufen perl im Runtime nie auf, kein pack/unpack ueber attacker-kontrollierte Templates. NVD-Publikation neu im Nightly-Scan 2026-07-15 (Issue #14)."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-57433
      reason: "perl-base Storable <3.41 signed integer overflow beim Deserialisieren eines crafted SX_HOOK-Records (CRITICAL) → av_extend erhaelt negativen Count → Panic bricht thaw()/retrieve() ab (DoS, keine RCE); Trixie 5.40.1-6 ohne Upstream-Fix (in forky/sid gefixt in 5.40.1-8 / Perl 5.43.11, aber nicht nach trixie zurueckportiert, Trivy-Fixed-Version leer, Base-Bump hilft nicht — identische Lage zu CVE-2026-57432); Dashboard/Analyzer-Images rufen perl im Runtime nie auf, kein Storable thaw()/retrieve() ueber attacker-kontrollierte Blobs. NVD-Publikation neu im Nightly-Scan 2026-07-22 (Issue #16)."
      expires: 2026-08-26
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-11822 / CVE-2026-11824 (sqlite3 / libsqlite3-0):
    # Zwei Schwachstellen in der SQLite-FTS5-Full-Text-Search-Extension,
    # beide "SQLite before 3.53.2":
    #   - CVE-2026-11822 (Trivy HIGH) — Memory-Corruption (out-of-bounds
    #     reads + heap buffer overflow) beim Verarbeiten malformed
    #     Database-Pages durch FTS5; je nach Pfad Crash, Memory-
    #     Exhaustion oder Code-Execution.
    #   - CVE-2026-11824 (Trivy HIGH) — heap-based buffer overflow in
    #     FTS5 beim Verarbeiten speziell praeparierter Databases →
    #     Crash oder arbitrary code execution.
    # Beide setzen einen Prozess voraus, der eine attacker-
    # kontrollierte SQLite-Datenbank MIT FTS5-Nutzung oeffnet/abfragt.
    # Debian-Stand (Security Tracker, 2026-06-14): "vulnerable" fuer
    # ALLE Suites (bullseye/bookworm/trixie/sid), Status `no-dsa`
    # ("Minor issue"); KEIN Fixed-Version-Eintrag — Upstream-Commits
    # existieren, sind aber noch in kein Debian-Paket (auch nicht sid)
    # zurueckportiert. Trivy-Report-"Fixed Version" leer. Ein
    # `apt-get upgrade` / Base-Image-Pull wuerde den Gate also NICHT
    # gruen machen — Suppression ist der einzige Weg bis zum Backport.
    # Trifft libsqlite3-0 3.46.1-7+deb13u1 in der Trixie-Slim-Base
    # (Dashboard + Analyzer-Service-Images; mtrace-api ist debian-12.14/
    # bookworm-Go-Image und meldet 0 Vulns, daher nicht im Scope).
    # Anmerkung Trivy-vs-Debian-Severity: Debian stuft `no-dsa`/Minor,
    # Trivy (Aqua/NVD) HIGH — der HIGH-Wert blockiert den Gate, darum
    # der Eintrag.
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - libsqlite3-0 ist nur ein transitives OS-Paket der trixie-
    #     slim-Base; die Node-Runtime (USER node, `CMD ["node", "build"]`
    #     SvelteKit-adapter-node bzw. Analyzer-WS) linkt/laedt es nie.
    #   - Codebase-grep (sqlite|better-sqlite|node:sqlite|libsql ueber
    #     apps/dashboard, apps/analyzer-service, packages) liefert NULL
    #     Treffer — kein SQLite-Zugriff im Produktcode, erst recht keine
    #     FTS5-Nutzung. (Selbst Nodes eingebautes `node:sqlite` wuerde
    #     eine gebundelte SQLite-Kopie nutzen, nicht system-libsqlite3-0.)
    #   - Kein Pfad, ueber den ein Angreifer eine praeparierte
    #     SQLite-Datei in einen FTS5-Query-Pfad einschleusen koennte.
    # Re-Review 2026-06-14 (Hotfix Nightly-Audit, Issue .github#6):
    # `expires` 90 Tage auf 2026-09-12. Naechster Re-Review-Trigger:
    # Trixie-Backport von sqlite3 >= 3.53.2 (bzw. ein deb13u-Backport)
    # ODER `expires`-Schwelle.
    - id: CVE-2026-11822
      reason: "sqlite3/libsqlite3-0 FTS5 Memory-Corruption (out-of-bounds read + heap overflow) via crafted DB, SQLite <3.53.2 (Trivy HIGH, Debian no-dsa/Minor); alle Debian-Suites vulnerable, KEIN Upstream-Fix (auch nicht sid), Base-Bump hilft nicht. libsqlite3-0 nur transitives OS-Paket der trixie-slim-Base; Node-Runtime nutzt kein SQLite (grep-bestaetigt, keine FTS5-Nutzung). NVD-Publikation neu im Nightly-Scan 2026-06-14."
      expires: 2026-09-12
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-11824
      reason: "sqlite3/libsqlite3-0 FTS5 Heap-based Buffer Overflow via crafted DB, SQLite <3.53.2 (Trivy HIGH, Debian no-dsa/Minor); alle Debian-Suites vulnerable, KEIN Upstream-Fix (auch nicht sid), Base-Bump hilft nicht. libsqlite3-0 nur transitives OS-Paket der trixie-slim-Base; Node-Runtime nutzt kein SQLite (grep-bestaetigt, keine FTS5-Nutzung). NVD-Publikation neu im Nightly-Scan 2026-06-14."
      expires: 2026-09-12
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-54369 (acl / libacl1) / CVE-2026-54371 (attr / libattr1):
    # Zwei Symlink-Traversal-Privilege-Escalations (CWE-59, beide Trivy
    # HIGH, CVSS 3.1 7.1) in den ACL-/xattr-Basispaketen der Trixie-
    # Slim-Base:
    #   - CVE-2026-54369 (acl <2.4.0) — TOCTOU-Symlink-Traversal in den
    #     pfadbasierten libacl-Funktionen acl_get_file(), acl_set_file(),
    #     acl_extended_file() und acl_delete_def_file(). Ein lokaler
    #     Angreifer, der eine Pfadkomponente kontrolliert, kann die
    #     ACL-Operation eines *privilegierten* Callers (getfacl/setfacl/
    #     chacl) per Symlink auf ein beliebiges Ziel umlenken →
    #     Privilege Escalation.
    #   - CVE-2026-54371 (attr <2.6.0) — dieselbe Symlink-Traversal-
    #     Klasse in den getfattr/setfattr-Utilities: ein privilegierter
    #     Prozess, der getfattr/setfattr ueber einen angreifer-
    #     kontrollierten Pfad aufruft, wird per Symlink umgelenkt.
    #     NVD-Publikation 2026-06-29.
    # Debian-Stand (Security Tracker): "vulnerable" fuer Debian 13
    # (trixie); KEIN Fixed-Version-Eintrag (Trivy-Report "Fixed Version"
    # leer) — Upstream-Fix (acl 2.4.0 / attr 2.6.0) noch nicht nach
    # Trixie zurueckportiert. Ein `apt-get upgrade` / Base-Image-Pull
    # macht den Gate also NICHT gruen; Suppression ist bis zum Backport
    # der einzige Weg. Trifft libacl1 (2.3.2-2+b1) und libattr1
    # (1:2.5.2-3) in der Trixie-Slim-Base (Dashboard + Analyzer-Service;
    # mtrace-api ist distroless-debian12 und meldet 0 Vulns, out of
    # scope).
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - Beide Exploits verlangen einen *privilegierten* (root-)Prozess,
    #     der die ACL-/xattr-Funktionen ueber einen angreifer-
    #     kontrollierten Pfad aufruft. Die Runtime-Images starten als
    #     unprivileged USER node mit `CMD ["node", "build"]` bzw.
    #     `CMD ["node", "dist/main.cjs"]` — kein root-Caller, keine
    #     Privilege-Domain oberhalb von node.
    #   - libacl1/libattr1 sind nur transitive OS-Pakete der trixie-
    #     slim-Base (coreutils-Abhaengigkeit); die Node-Runtime linkt/
    #     laedt sie nie und ruft weder getfacl/setfacl/chacl noch
    #     getfattr/setfattr auf.
    #   - Codebase-grep (setfacl|getfacl|getfattr|setfattr|xattr|acl
    #     ueber apps/dashboard/src, apps/analyzer-service/src, packages)
    #     liefert NULL Treffer — kein ACL-/xattr-Aufruf im Produktcode.
    #   - Einziger Ingress ist HTTP (SvelteKit-adapter-node) bzw. der
    #     Analyzer-WS, beides node-only; kein Pfad, ueber den ein
    #     Angreifer einen Symlink in einen privilegierten ACL-/xattr-
    #     Traversal einschleusen koennte.
    # Re-Review 2026-07-01 (Hotfix Nightly-Audit, Issue #10): `expires`
    # 90 Tage auf 2026-09-29. Naechster Re-Review-Trigger: Trixie-
    # Backport von acl >= 2.4.0 bzw. attr >= 2.6.0 (deb13u-Update)
    # ODER `expires`-Schwelle.
    - id: CVE-2026-54369
      reason: "acl/libacl1 TOCTOU-Symlink-Traversal in den pfadbasierten libacl-Funktionen (acl_get_file/acl_set_file/acl_extended_file/acl_delete_def_file), acl <2.4.0 (Trivy HIGH, CVSS 7.1, CWE-59) → lokale Privilege Escalation via privilegiertem getfacl/setfacl/chacl-Caller; Trixie ohne Upstream-Fix (kein Fixed-Version-Eintrag, Base-Bump hilft nicht). libacl1 nur transitives OS-Paket der trixie-slim-Base; Node-Runtime ruft keine ACL-Funktion auf (grep-bestaetigt), USER node ohne privilegierten Caller. Neu im Nightly-Scan 2026-07-01."
      expires: 2026-09-29
      scope: "mtrace-dashboard, mtrace-analyzer-service"
    - id: CVE-2026-54371
      reason: "attr/libattr1 Symlink-Traversal in getfattr/setfattr, attr <2.6.0 (Trivy HIGH, CVSS 7.1, CWE-59) → lokale Privilege Escalation via privilegiertem getfattr/setfattr-Caller ueber angreifer-kontrollierten Pfad; Trixie ohne Upstream-Fix (kein Fixed-Version-Eintrag, Base-Bump hilft nicht). libattr1 nur transitives OS-Paket der trixie-slim-Base; Node-Runtime ruft kein xattr-Utility auf (grep-bestaetigt), USER node ohne privilegierten Caller. NVD-Publikation 2026-06-29, neu im Nightly-Scan 2026-07-01."
      expires: 2026-09-29
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-41992 (gzip): Global Buffer Over-read (CWE-126) im
    # LZH-Decoder von GNU gzip bis einschliesslich 1.14. Der Bug
    # entsteht durch falsch wiederverwendeten shared Global-State
    # zwischen den Dekompressions-Formaten: erst "vergiftet" eine
    # praeparierte LZW-Datei das shared Array, dann liest der
    # LZH-Decoder beim Verarbeiten einer zweiten, praeparierten
    # LZH-Datei out-of-bounds — Voraussetzung ist ein einziger
    # `gzip -d`-Aufruf ueber BEIDE attacker-kontrollierten Dateien
    # nacheinander. Effekt: Information Disclosure (read-only,
    # kein Write-Primitive).
    # Severity: NIST CVSS 3.1 7.5 HIGH (AV:N/AC:L/PR:N/UI:N/S:U/
    # C:H/I:N/A:N); CNA CERT.PL CVSS 4.0 nur 6.9 MEDIUM (AV:L —
    # realistischer, da ein lokaler gzip-Aufruf noetig ist).
    # Trivy stuft HIGH, darum blockiert der Gate.
    # NVD-Publikation 2026-06-29.
    # Debian-Stand (Security Tracker, 2026-07-02): "vulnerable"
    # fuer ALLE Suites (bullseye/bookworm/trixie/sid), Status
    # `no-dsa` ("Minor issue"); KEIN Fixed-Version-Eintrag —
    # Upstream-Fix (Commit 63dbf6b3) existiert, ist aber in kein
    # Debian-Paket (auch nicht sid) eingeflossen. Ein
    # `apt-get upgrade` / Base-Image-Pull macht den Gate also
    # NICHT gruen; Suppression ist bis zum Backport der einzige
    # Weg. Trifft gzip 1.13-1 in der Trixie-Slim-Base (Dashboard
    # + Analyzer-Service; mtrace-api ist distroless-debian12 und
    # meldet 0 Vulns, out of scope).
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - Der Exploit verlangt einen gzip-CLI-Aufruf (`gzip -d`)
    #     ueber attacker-kontrollierte LZW-+LZH-Dateien. Die
    #     Runtime-Images starten als USER node mit
    #     `CMD ["node", "build"]` bzw. `CMD ["node", "dist/main.cjs"]`
    #     — kein gzip-Aufruf im Runtime-Pfad; Nodes eigene
    #     gzip-/deflate-Verarbeitung laeuft ueber die gebundelte
    #     zlib, nicht ueber das gzip-Binary (und zlib hat keinen
    #     LZH-Codepfad).
    #   - Codebase-grep (gzip|.lzh|zcat|gunzip ueber
    #     apps/dashboard/src, apps/analyzer-service/src, packages)
    #     liefert NULL Treffer — kein gzip-CLI-Aufruf im
    #     Produktcode.
    #   - Einziger Ingress ist HTTP (SvelteKit-adapter-node) bzw.
    #     der Analyzer-WS, beides node-only; kein Pfad, ueber den
    #     ein Angreifer praeparierte Dateien in einen
    #     gzip-CLI-Aufruf einschleusen koennte.
    # Re-Review 2026-07-02 (Hotfix Nightly-Audit, Issue #11):
    # `expires` 90 Tage auf 2026-09-30. Naechster Re-Review-
    # Trigger: Debian-Paketierung des Upstream-Fixes (gzip >1.14
    # bzw. deb13u-Backport) ODER `expires`-Schwelle.
    - id: CVE-2026-41992
      reason: "gzip <=1.14 Global Buffer Over-read im LZH-Decoder (CWE-126, NIST 7.5 HIGH / CNA 6.9 MEDIUM) → Info-Disclosure, benoetigt `gzip -d` ueber praeparierte LZW-+LZH-Dateien in einem Aufruf; alle Debian-Suites vulnerable, KEIN Fix-Paket (no-dsa/Minor, Upstream-Commit nicht paketiert), Base-Bump hilft nicht. gzip nur transitives OS-Paket der trixie-slim-Base; Node-Runtime ruft das gzip-CLI nie auf (grep-bestaetigt), Node nutzt gebundelte zlib ohne LZH-Pfad. NVD-Publikation 2026-06-29, neu im Nightly-Scan 2026-07-02."
      expires: 2026-09-30
      scope: "mtrace-dashboard, mtrace-analyzer-service"

    # CVE-2026-53615 (util-linux / libblkid): Integer Overflow
    # (uint32_t) in parse_dos_extended() — dem EBR-Parser (Extended
    # Boot Record) in libblkid/src/partitions/dos.c. Ein praepariertes
    # Block-Device-Image mit manipuliertem EBR laesst libblkid eine
    # Partition bei Sektor 0 (MBR) registrieren; der Bug existiert seit
    # 2009 (util-linux-ng 2.17). NVD-Publikation ~2026-06-18, Trivy
    # stuft (Aqua/Debian) HIGH. Betrifft die gesamte util-linux-
    # Paketkohorte der Trixie-Slim-Base 2.41-5 (bsdutils, libblkid1,
    # liblastlog2-2, libmount1, libsmartcols1, libuuid1, login, mount,
    # util-linux — 9 Packages).
    # Debian-Stand: KEIN Fix-Paket ("Fixed Version"-Spalte leer);
    # Upstream-Fix (Karel Zak) noch nicht nach Trixie paketiert, ein
    # Base-Bump/`apt-get upgrade` hilft daher nicht.
    # Vektor im m-trace-Runtime nicht erreichbar:
    #   - Der Angriffspfad braucht ein praepariertes Block-Device, das
    #     libblkid probet — laut Advisory typischerweise via
    #     udev/udisks als root beim Hot-Plug (USB-Insertion,
    #     loop-gemountetes Image).
    #   - Dashboard- und Analyzer-Service-Runtime sind Node-Container
    #     (SvelteKit-adapter-node bzw. Analyzer-WS), USER node: **kein**
    #     udev/udisks, **keine** Block-Device-Hot-Plug-Events, keine
    #     USB-/loop-mount-Surface, kein privilegierter Device-Zugriff.
    #   - Codebase-grep bestaetigt: kein blkid/libblkid/partition-
    #     Aufruf im Node-Pfad (einzige "partition"-Treffer sind
    #     `(project_id, session_id)`-Event-Partitionen, semantisch
    #     unverwandt). libblkid liegt nur als util-linux-Transitivpaket
    #     der Base, wird im Runtime nie invoked.
    # Re-Review 2026-07-10 (Nightly-Audit, Issue #12/#13): `expires`
    # 90 Tage auf 2026-10-08. Naechster Re-Review-Trigger: Debian-
    # Paketierung des Upstream-Fixes (Trixie-DSA/deb13u-Backport) ODER
    # `expires`-Schwelle.
    - id: CVE-2026-53615
      reason: "util-linux/libblkid parse_dos_extended() Integer Overflow (EBR-Parser, dos.c; HIGH) → crafted Block-Device registriert Partition bei Sektor 0; Trixie-Base 2.41-5, KEIN Fix-Paket (Fixed Version leer, Upstream-Fix nicht nach Trixie paketiert, Base-Bump hilft nicht). Vektor braucht libblkid-Probing eines praeparierten Block-Devices (udev/udisks-Hot-Plug); Node-Container ohne udev/udisks, ohne Block-Device-/USB-/loop-Surface, USER node, ruft libblkid nie auf (grep-bestaetigt). NVD-Publikation ~2026-06-18, neu im Nightly-Scan. Trifft 9 util-linux-Packages."
      expires: 2026-10-08
      scope: "mtrace-dashboard, mtrace-analyzer-service"

