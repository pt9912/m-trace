# Single-binary Tempo-Konfig fuer das `0.4.0`-Lab (plan-0.4.0 §6).
# RAK-31 ist Kann-Scope — diese Konfig faehrt Tempo bewusst minimal
# als optionales Trace-Backend hoch (Local-Storage, keine Multi-Tenant-
# Auth, keine Retention-Tuning). Die durable Source-of-Truth fuer
# Sessions bleibt SQLite (RAK-32, ADR-0002); Tempo erweitert nur die
# Debug-Tiefe (siehe `spec/telemetry-model.md` §2.6).

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Tempo-Search ueber HTTP API: `GET /api/search` primaer per TraceQL
# plus explizitem start/end-Fenster. Der Smoke sucht konkret nach dem
# Span-Attribut `mtrace.session.correlation_id`; `tags=` bleibt nur
# Legacy-Fallback. Siehe Smoke in scripts/smoke-tempo.sh (§6.4) und
# Trace-Such-Vertrag in `spec/telemetry-model.md` §2.6.
