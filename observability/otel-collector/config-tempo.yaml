# OTel-Collector-Konfiguration mit Tempo-Pipeline (plan-0.4.0 §6.3).
# Gleicher Receiver-/Processor-/Health-Stack wie `config.yaml`; einziger
# Unterschied ist die `traces`-Pipeline, die zusätzlich zu `debug`
# einen `otlp/tempo`-Exporter füttert. Aktiv nur bei `make dev-tempo`
# über `COLLECTOR_CONFIG=config-tempo.yaml` (siehe Makefile + plan-0.4.0
# §6.3); `make dev-observability` lädt diesen Config-Pfad nie und löst
# damit auch keinen Tempo-Verbindungsversuch aus.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
  debug:
    verbosity: basic
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  extensions:
    - health_check
  pipelines:
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - prometheus
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
        - otlp/tempo
